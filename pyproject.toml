[tool.mypy]
python_version = "3.12"
strict = true

plugins = [
    "pydantic.mypy",
    "sqlalchemy.ext.mypy.plugin",
]

warn_return_any = true
warn_unused_configs = true
warn_unreachable = true
warn_unused_ignores = true

disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true

ignore_missing_imports = true

files = ["app/", "tests/"]
exclude = ["alembic", "migrations"]

[[tool.mypy.overrides]]
module = [
    "fastapi.*",
    "starlette.*",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "app.router.*",
]
disable_error_code = [
    "untyped-decorator",
]

[[tool.mypy.overrides]]
module = [
    "tests.*",
]
disable_error_code = [
    "untyped-decorator",
]

[[tool.mypy.overrides]]
module = [
    "alembic.*",
]
ignore_errors = true


[tool.ruff]
target-version = "py312"
line-length = 110
fix = true
show-fixes = true

exclude = [
    "env",
    "alembic",
    "migrations",
    ".pyenv",
    ".git",
    ".vscode",
]


[tool.ruff.format]
docstring-code-format = true
skip-magic-trailing-comma = true
quote-style = "double"
indent-style = "space"
line-ending = "lf"


[tool.ruff.lint]

# Disable preview rules
preview = false

select = [
    "F",
    "E",
    "W",
    "I",
    "B",
    "UP",
    "ARG",
    "C4",
    "SIM",
    "ANN",
    "N",
    "D",
    "RET",
    "RUF",
    "TC",
    "TID",
]

ignore = [
    "ANN401",
    "ANN201",
    "COM812",
    "D1",
    "D2",
    "D404",
    "EXE002",
    "FIX",
    "ISC001",
    "PLR0913",
    "SIM102",
    "SIM108",
    "TD002",
    "TD003",
    "TID252",
    "PLC0415",
    "ERA001",
    "CPY001",
    "PLR6301",
    "RUF029",
    "RET504",
    "RUF043",

    # FastAPI
    "B008",
    "ARG001",
]


[tool.coverage.report]
exclude_also = [
    "if TYPE_CHECKING:",
]


[tool.ruff.lint.per-file-ignores]

"app/models/__init__.py" = [
    "E402",
]

"app/job/tasks/__init__.py" = [
    "INP001",
]

"tests/**/*.py" = [
    "INP001",
    "S101",
    "SLF001",
    "PLR6301",
    "PLR2004",
]


[tool.ruff.lint.isort]
split-on-trailing-comma = false


[tool.coverage.run]
omit = [
    "app/schema/*",
    "app/models/*",
]